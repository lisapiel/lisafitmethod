version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx ampx generate outputs --branch $AWS_BRANCH --app-id $AWS_APP_ID
        - |
          node -e "
            const fs = require('fs');
            const keys = ['STRIPE_SECRET_KEY','STRIPE_WEBHOOK_SECRET','COGNITO_AWS_ACCESS_KEY_ID','COGNITO_AWS_SECRET_ACCESS_KEY','COGNITO_REGION','COGNITO_USER_POOL_ID','RESEND_API_KEY','PROMO_CODES'];
            const lines = keys.map(k => { const v = process.env[k] || ''; console.log(k + '=' + (v ? 'SET' : 'EMPTY')); return k + '=' + v; });
            fs.writeFileSync('.env.production.local', lines.join('\n') + '\n');
            console.log('Written .env.production.local');
          "
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
      - .next/cache/**/*
