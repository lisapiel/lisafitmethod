version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - |
          node -e "
            const fs = require('fs');
            const config = {
              version: '1',
              auth: {
                user_pool_id: process.env.NEXT_PUBLIC_COGNITO_USER_POOL_ID || '',
                aws_region: process.env.COGNITO_REGION || 'us-east-2',
                user_pool_client_id: process.env.NEXT_PUBLIC_COGNITO_USER_POOL_CLIENT_ID || '',
                identity_pool_id: 'us-east-2:b45eadec-da26-43c3-adb0-933823ad5a6f',
                username_attributes: ['email'],
                user_verification_types: ['email'],
                unauthenticated_identities_enabled: true,
                mfa_configuration: 'NONE'
              },
              storage: {
                aws_region: 'us-east-2',
                bucket_name: 'amplify-lisafitmethod-lis-lisafitmediastorebucket2-kgef6soixdov',
                buckets: [
                  {
                    name: 'lisafitmediastore',
                    bucket_name: 'amplify-lisafitmethod-lis-lisafitmediastorebucket2-kgef6soixdov',
                    aws_region: 'us-east-2',
                    paths: {
                      'media/videos/*': { guest: ['read'], authenticated: ['read', 'write', 'delete'] },
                      'media/photos/*': { guest: ['read'], authenticated: ['read', 'write', 'delete'] }
                    }
                  }
                ]
              },
              data: {
                url: process.env.APPSYNC_URL || '',
                aws_region: process.env.COGNITO_REGION || 'us-east-2',
                api_key: process.env.APPSYNC_API_KEY || '',
                default_authorization_type: 'API_KEY',
                authorization_types: ['AMAZON_COGNITO_USER_POOLS'],
                model_introspection: {
                  version: 1,
                  models: {
                    MediaAsset: {
                      name: 'MediaAsset',
                      fields: {
                        id: { name: 'id', isArray: false, type: 'ID', isRequired: true, attributes: [] },
                        type: { name: 'type', isArray: false, type: { enum: 'MediaAssetType' }, isRequired: false, attributes: [] },
                        title: { name: 'title', isArray: false, type: 'String', isRequired: true, attributes: [] },
                        s3Key: { name: 's3Key', isArray: false, type: 'String', isRequired: true, attributes: [] },
                        url: { name: 'url', isArray: false, type: 'String', isRequired: false, attributes: [] },
                        assignedTo: { name: 'assignedTo', isArray: false, type: 'String', isRequired: true, attributes: [] },
                        isPublished: { name: 'isPublished', isArray: false, type: 'Boolean', isRequired: true, attributes: [] },
                        fileSize: { name: 'fileSize', isArray: false, type: 'Int', isRequired: false, attributes: [] },
                        mimeType: { name: 'mimeType', isArray: false, type: 'String', isRequired: false, attributes: [] },
                        createdAt: { name: 'createdAt', isArray: false, type: 'AWSDateTime', isRequired: false, attributes: [], isReadOnly: true },
                        updatedAt: { name: 'updatedAt', isArray: false, type: 'AWSDateTime', isRequired: false, attributes: [], isReadOnly: true }
                      },
                      syncable: true,
                      pluralName: 'MediaAssets',
                      attributes: [
                        { type: 'model', properties: {} },
                        { type: 'auth', properties: { rules: [
                          { allow: 'public', provider: 'apiKey', operations: ['read'] },
                          { allow: 'public', provider: 'iam', operations: ['read'] },
                          { allow: 'private', provider: 'userPools', operations: ['create', 'read', 'update', 'delete'] }
                        ]}}
                      ],
                      primaryKeyInfo: { isCustomPrimaryKey: false, primaryKeyFieldName: 'id', sortKeyFieldNames: [] }
                    }
                  },
                  enums: {
                    MediaAssetType: { name: 'MediaAssetType', values: ['VIDEO', 'PHOTO'] }
                  },
                  nonModels: {}
                }
              }
            };
            fs.writeFileSync('amplify_outputs.json', JSON.stringify(config, null, 2));
            console.log('Generated amplify_outputs.json from env vars');
          "
        - |
          printf "STRIPE_SECRET_KEY=%s\nSTRIPE_WEBHOOK_SECRET=%s\nCOGNITO_AWS_ACCESS_KEY_ID=%s\nCOGNITO_AWS_SECRET_ACCESS_KEY=%s\nCOGNITO_REGION=%s\nCOGNITO_USER_POOL_ID=%s\nAPPSYNC_URL=%s\nAPPSYNC_API_KEY=%s\n" \
            "$STRIPE_SECRET_KEY" "$STRIPE_WEBHOOK_SECRET" "$COGNITO_AWS_ACCESS_KEY_ID" "$COGNITO_AWS_SECRET_ACCESS_KEY" \
            "$COGNITO_REGION" "$COGNITO_USER_POOL_ID" "$APPSYNC_URL" "$APPSYNC_API_KEY" >> .env.production.local
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
